<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Festival Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <a href="/home" class="btn btn-outline-secondary mb-4">← Back to Dashboard</a>

  <div class="card shadow-sm border-top border-info border-4" style="max-width: 600px;">
    <div class="card-header bg-white pb-0">
      <h2 th:field="${artist.name}">Festival Name</h2>
      <p class="text-muted">Festival ID: <span th:text="${artist.id}"></span></p>
    </div>
    <div class="card-body">
      <h5 class="card-title">Location</h5>
      <p class="card-text fs-5" th:text="${artist.location}">Location City/State</p>

      <hr>

      <h5>Lineup</h5>
      <p class="text-muted fst-italic">No artists assigned yet.</p>
    </div>
    <div class="card-footer bg-white text-end">
      <a th:href="@{/home/deleteFestival/{id}(id=${artist.id})}" class="btn btn-danger">Delete Festival</a>
    </div>
  </div>
</div>

</body>
</html>
